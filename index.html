<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Meu Health Tracker</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff7857",
                        "secondary": "#0ea5e9",
                        "background-light": "#fafaf9", // Unificado
                        "background-dark": "#17191e",
                        // Cores do Histórico
                        "soft-blue": "#E0F2F1",
                        "soft-green": "#E8F5E9",
                        "soft-orange": "#FFF3E0",
                        "soft-pink": "#FCE4EC",
                        "whatsapp": "#25D366",
                        "text-main": "#5D4037",
                        "text-dark-brown": "#3E2723",
                        "status-ok": "#4CAF50",
                        "status-warn": "#FF9800",
                        "status-danger": "#F44336"
                    },
                    fontFamily: {
                        "lexend": ["Lexend", "sans-serif"],
                        "quicksand": ["Quicksand", "sans-serif"]
                    },
                    borderRadius: {
                        "card": "1.25rem",
                        "xl": "1.25rem"
                    }
                },
            },
        }
    </script>
    
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #fafaf9;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        .dark body {
            background-color: #17191e;
        }
        /* Utilitários iOS */
        .ios-blur {
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        /* Animação suave para modal */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Componentes SVG/Ícones ---
        const Icon = ({ name, className, fill = 0 }) => (
            <span className={`material-symbols-outlined ${className}`} style={{ fontVariationSettings: `'FILL' ${fill}, 'wght' 400, 'GRAD' 0, 'opsz' 24` }}>
                {name}
            </span>
        );

        // --- Tela: Perfil ---
        const ProfileScreen = ({ userProfile, onSave, onBack }) => {
            const [formData, setFormData] = useState(userProfile);

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'number' ? parseFloat(value) : value
                }));
            };

            const calculateIdealWeight = () => {
                if (!formData.height) return { min: 0, max: 0 };
                const h = formData.height / 100;
                // IMC Saudável: 18.5 a 24.9
                const min = (18.5 * h * h).toFixed(1);
                const max = (24.9 * h * h).toFixed(1);
                return { min, max };
            };

            const ideal = calculateIdealWeight();

            return (
                <div className="flex flex-col min-h-screen font-lexend pb-28 animate-fade-in">
                    <header className="flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-3 pb-1 justify-between sticky top-0 z-10">
                        <div onClick={onBack} className="text-primary flex size-10 shrink-0 items-center cursor-pointer hover:bg-black/5 rounded-full justify-center transition-colors">
                            <Icon name="arrow_back_ios_new" />
                        </div>
                        <h2 className="text-slate-900 dark:text-white text-base font-bold leading-tight flex-1 text-center pr-10">Perfil</h2>
                    </header>

                    <main className="flex-1 px-4 mt-2">
                        <div className="pt-2 pb-3">
                            <h2 className="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight">Personalize seu perfil</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-sm font-normal pt-1">Ajuste os campos para calcular suas metas.</p>
                        </div>

                        <div className="space-y-3 mt-1">
                            {/* Nome */}
                            <section className="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                <h3 className="text-slate-900 dark:text-white text-sm font-semibold mb-1">Nome ou Apelido</h3>
                                <input 
                                    name="name"
                                    value={formData.name}
                                    onChange={handleChange}
                                    className="w-full bg-slate-50 dark:bg-slate-900 border-none rounded-lg py-2 px-3 text-lg font-semibold text-slate-900 dark:text-white focus:ring-2 focus:ring-primary outline-none"
                                    placeholder="Como quer ser chamado?"
                                />
                            </section>

                            <div className="grid grid-cols-2 gap-3">
                                {/* Idade */}
                                <section className="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                    <h3 className="text-slate-900 dark:text-white text-xs font-bold mb-2 uppercase opacity-70">Idade</h3>
                                    <div className="relative flex items-center">
                                        <input 
                                            name="age"
                                            type="number"
                                            value={formData.age}
                                            onChange={handleChange}
                                            className="w-full bg-slate-50 dark:bg-slate-900 border-none rounded-lg py-2 pl-3 pr-10 text-xl font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-primary outline-none"
                                            placeholder="25"
                                        />
                                        <span className="absolute right-2 text-[10px] text-slate-400 font-bold uppercase tracking-wider">ANOS</span>
                                    </div>
                                </section>

                                {/* Altura */}
                                <section className="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                    <h3 className="text-slate-900 dark:text-white text-xs font-bold mb-2 uppercase opacity-70">Altura</h3>
                                    <div className="relative flex items-center">
                                        <input 
                                            name="height"
                                            type="number"
                                            value={formData.height}
                                            onChange={handleChange}
                                            className="w-full bg-slate-50 dark:bg-slate-900 border-none rounded-lg py-2 pl-3 pr-8 text-xl font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-primary outline-none"
                                            placeholder="175"
                                        />
                                        <span className="absolute right-2 text-[10px] text-slate-400 font-bold uppercase tracking-wider">CM</span>
                                    </div>
                                </section>
                            </div>

                            {/* Gênero */}
                            <section className="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                <div className="flex items-center gap-4">
                                    <h3 className="text-slate-900 dark:text-white text-sm font-semibold shrink-0">Eu sou:</h3>
                                    <div className="flex h-9 grow items-center rounded-lg bg-slate-100 dark:bg-slate-900 p-1">
                                        {['Masculino', 'Feminino'].map(gender => (
                                            <label key={gender} className={`flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-md px-2 text-xs font-medium transition-all ${formData.gender === gender ? 'bg-white dark:bg-slate-700 shadow-sm text-primary' : 'text-slate-500'}`}>
                                                <span>{gender}</span>
                                                <input 
                                                    type="radio" 
                                                    name="gender" 
                                                    value={gender}
                                                    checked={formData.gender === gender}
                                                    onChange={handleChange}
                                                    className="hidden" 
                                                />
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            {/* Card Peso Ideal */}
                            <section className="space-y-3">
                                <div className="bg-success p-4 rounded-xl shadow-md shadow-success/10 text-white relative overflow-hidden">
                                    <div className="relative z-10 flex justify-between items-center">
                                        <div>
                                            <div className="flex items-center gap-1.5 mb-0.5">
                                                <Icon name="verified" className="text-[16px]" />
                                                <span className="text-[10px] font-bold uppercase tracking-wider opacity-90">Peso Ideal (IMC)</span>
                                            </div>
                                            <div className="text-2xl font-bold">{ideal.min} - {ideal.max} <span className="text-sm font-medium opacity-80">kg</span></div>
                                        </div>
                                        <p className="text-[9px] opacity-90 leading-tight max-w-[120px] text-right">
                                            Baseado no IMC saudável (18.5 - 24.9).
                                        </p>
                                    </div>
                                    <Icon name="monitor_weight" className="absolute -right-3 -bottom-3 text-[70px] opacity-10 rotate-12 pointer-events-none" />
                                </div>

                                <div className="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                    <h3 className="text-slate-900 dark:text-white text-sm font-semibold mb-2">Qual seu Peso Alvo?</h3>
                                    <div className="relative flex items-center">
                                        <input 
                                            name="targetWeight"
                                            type="number"
                                            step="0.1"
                                            value={formData.targetWeight}
                                            onChange={handleChange}
                                            className="w-full bg-slate-50 dark:bg-slate-900 border-none rounded-lg py-2 px-3 text-xl font-bold text-slate-900 dark:text-white focus:ring-2 focus:ring-primary outline-none transition-all placeholder:text-slate-300"
                                            placeholder="70.0"
                                        />
                                        <span className="absolute right-3 text-sm text-slate-400 font-medium">kg</span>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-gradient-to-t from-background-light via-background-light/95 dark:from-background-dark dark:via-background-dark/95 to-transparent z-20">
                        <button onClick={() => onSave(formData)} className="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-[0_8px_20px_-4px_rgba(255,120,87,0.4)] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                            <span>Salvar Perfil</span>
                            <Icon name="check" className="text-[18px]" />
                        </button>
                    </footer>
                </div>
            );
        };

        // --- Modal: Adicionar Registro ---
        const AddEntryModal = ({ onClose, onSave, lastEntry }) => {
            const [entry, setEntry] = useState({
                weight: '',
                waist: '',
                date: new Date().toISOString().split('T')[0]
            });

            const handleRepeatLast = () => {
                if (lastEntry) {
                    setEntry(prev => ({ ...prev, waist: lastEntry.waist }));
                }
            };

            const handleSubmit = () => {
                if (!entry.weight) return;
                onSave({
                    id: Date.now(),
                    weight: parseFloat(entry.weight),
                    waist: entry.waist ? parseFloat(entry.waist) : null,
                    date: entry.date,
                    timestamp: Date.now()
                });
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    {/* Backdrop */}
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
                    
                    {/* Modal Content */}
                    <div className="bg-white dark:bg-[#2d1a15] w-full max-w-[440px] rounded-xl shadow-2xl overflow-hidden flex flex-col relative z-10 animate-fade-in font-lexend">
                        <div className="flex items-center justify-between p-6 pb-2">
                            <h2 className="text-[#1d100c] dark:text-white text-2xl font-bold tracking-tight">Adicionar Medidas</h2>
                            <button onClick={onClose} className="text-[#1d100c] dark:text-white/60 p-2 hover:bg-black/5 rounded-full transition-colors">
                                <Icon name="close" />
                            </button>
                        </div>

                        <div className="p-6 space-y-6">
                            {/* Peso */}
                            <div className="space-y-2">
                                <label className="block text-[#1d100c] dark:text-white/80 text-sm font-semibold ml-1">Peso (kg)</label>
                                <div className="relative group">
                                    <input 
                                        autoFocus
                                        type="number"
                                        step="0.1"
                                        inputMode="decimal"
                                        value={entry.weight}
                                        onChange={(e) => setEntry({...entry, weight: e.target.value})}
                                        className="w-full h-14 bg-background-light dark:bg-background-dark border border-[#ead3cd] dark:border-[#3d2a25] rounded-xl px-4 pr-12 text-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#a15745]/50 dark:text-white"
                                        placeholder="00,0"
                                    />
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
                                        <Icon name="scale" />
                                    </div>
                                </div>
                            </div>

                            {/* Cintura */}
                            <div className="space-y-2">
                                <div className="flex items-center justify-between ml-1">
                                    <div className="flex items-baseline gap-1.5">
                                        <label className="block text-[#1d100c]/60 dark:text-white/40 text-sm font-medium leading-tight">Cintura (cm)</label>
                                        <span className="text-[11px] font-normal text-[#1d100c]/40 dark:text-white/30">(Opcional)</span>
                                    </div>
                                    <button onClick={handleRepeatLast} className="flex items-center gap-1.5 px-3 py-1.5 bg-secondary/10 hover:bg-secondary/20 text-secondary border border-secondary/20 rounded-full transition-all active:scale-95 shadow-sm">
                                        <Icon name="history" className="text-[16px]" />
                                        <span className="text-xs font-bold tracking-tight">Repetir última</span>
                                    </button>
                                </div>
                                <div className="relative group">
                                    <input 
                                        type="number"
                                        inputMode="numeric"
                                        value={entry.waist}
                                        onChange={(e) => setEntry({...entry, waist: e.target.value})}
                                        className="w-full h-12 bg-background-light/50 dark:bg-background-dark/50 border border-[#ead3cd]/60 dark:border-[#3d2a25]/60 rounded-xl px-4 pr-12 text-base focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-[#a15745]/30 dark:text-white/60"
                                        placeholder="00"
                                    />
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 text-[#a15745]/40 dark:text-white/30">
                                        <Icon name="straighten" />
                                    </div>
                                </div>
                            </div>

                            {/* Data */}
                            <div className="space-y-2">
                                <label className="block text-[#1d100c] dark:text-white/80 text-sm font-semibold ml-1">Data</label>
                                <div className="relative group">
                                    <input 
                                        type="date"
                                        value={entry.date}
                                        onChange={(e) => setEntry({...entry, date: e.target.value})}
                                        className="w-full h-14 bg-background-light dark:bg-background-dark border border-[#ead3cd] dark:border-[#3d2a25] rounded-xl px-4 text-lg dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                    />
                                </div>
                            </div>
                        </div>

                        <div className="p-6 pt-2 bg-background-light/50 dark:bg-black/20 flex flex-col gap-3">
                            <button onClick={handleSubmit} className="w-full h-14 bg-primary text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                                <Icon name="check_circle" />
                                <span>Salvar Registro</span>
                            </button>
                            <button onClick={onClose} className="w-full h-12 bg-transparent border-2 border-[#ead3cd] dark:border-[#3d2a25] text-[#1d100c] dark:text-white text-base font-semibold rounded-xl hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Tela: Histórico (Home) ---
        const HistoryScreen = ({ entries, userProfile, onDeleteEntry }) => {
            const [openDetailId, setOpenDetailId] = useState(null);

            // Cálculos auxiliares
            const getCalculatedData = (entry) => {
                let risk = "N/A";
                let color = "bg-gray-200";
                
                // Risco (Cintura / Altura)
                if (entry.waist && userProfile.height) {
                    const ratio = entry.waist / userProfile.height;
                    if (ratio < 0.5) { risk = "Baixo"; color = "bg-status-ok"; }
                    else if (ratio < 0.6) { risk = "Médio"; color = "bg-status-warn"; }
                    else { risk = "Alto"; color = "bg-status-danger"; }
                }

                // IMC
                let imc = 0;
                if (entry.weight && userProfile.height) {
                    const h = userProfile.height / 100;
                    imc = (entry.weight / (h * h)).toFixed(1);
                }

                return { risk, riskColor: color, imc };
            };

            const formatDate = (dateStr) => {
                const date = new Date(dateStr + 'T12:00:00'); // Fix timezone issue simply
                const day = date.getDate();
                const month = date.toLocaleDateString('pt-BR', { month: 'short' }).toUpperCase().replace('.', '');
                return { day, month };
            };

            return (
                <div className="font-quicksand min-h-screen pb-32">
                    <header className="sticky top-0 z-40 bg-[#FAF9F6]/80 dark:bg-background-dark/80 ios-blur border-b border-orange-50 dark:border-slate-800">
                        <div className="flex items-center justify-between px-4 h-14">
                            <h1 className="text-lg font-bold tracking-tight text-text-main dark:text-white">Histórico</h1>
                            <div className="text-xs font-medium text-primary bg-primary/10 px-3 py-1 rounded-full">
                                {entries.length} Registros
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto">
                        <div className="px-4 py-4 flex gap-2 overflow-x-auto no-scrollbar">
                            <button className="px-5 py-1.5 bg-primary text-white text-xs font-bold rounded-full whitespace-nowrap shadow-sm">Todos</button>
                            <button className="px-5 py-1.5 bg-white dark:bg-slate-800 dark:text-white text-text-main/50 text-xs font-bold rounded-full whitespace-nowrap border border-orange-100 dark:border-slate-700">7 dias</button>
                        </div>

                        <div className="flex flex-col space-y-3 px-4">
                            {entries.length === 0 && (
                                <div className="text-center py-10 opacity-50">
                                    <Icon name="history_toggle_off" className="text-4xl mb-2" />
                                    <p>Nenhum registro ainda.</p>
                                </div>
                            )}

                            {entries.map(entry => {
                                const { risk, riskColor, imc } = getCalculatedData(entry);
                                const { day, month } = formatDate(entry.date);
                                const isOpen = openDetailId === entry.id;

                                return (
                                    <div key={entry.id} className="bg-white dark:bg-slate-800 rounded-card soft-shadow border border-orange-50/50 dark:border-slate-700 overflow-hidden transition-all duration-300">
                                        <div 
                                            className="cursor-pointer" 
                                            onClick={() => setOpenDetailId(isOpen ? null : entry.id)}
                                        >
                                            {!isOpen ? (
                                                // Visão Fechada
                                                <div className="p-3 flex items-center gap-4">
                                                    <div className="flex flex-col items-center justify-center min-w-[65px] border-r border-orange-50 dark:border-slate-700 pr-3">
                                                        <span className="text-[11px] font-black text-text-dark-brown dark:text-slate-300 uppercase leading-none mb-1">{day} {month}</span>
                                                        <div className="flex items-baseline gap-0.5">
                                                            <span className="text-2xl font-bold text-text-main dark:text-white">{entry.weight}</span>
                                                            <span className="text-[10px] font-medium text-text-main/60 dark:text-white/60">kg</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex-1 flex justify-between px-2">
                                                        <div className="flex flex-col items-center gap-1">
                                                            <Icon name="straighten" className="text-blue-400 text-lg" />
                                                            <span className="text-[11px] font-bold text-text-main dark:text-white">{entry.waist || '--'}<span className="text-[9px] font-normal ml-0.5 text-text-main/60">cm</span></span>
                                                        </div>
                                                        <div className="flex flex-col items-center gap-1">
                                                            <Icon name="calculate" className="text-orange-400 text-lg" />
                                                            <span className="text-[11px] font-bold text-text-main dark:text-white">{imc}</span>
                                                        </div>
                                                        <div className="flex flex-col items-center gap-1">
                                                            <Icon name="favorite" className="text-pink-400 text-lg" />
                                                            <span className="text-[11px] font-bold text-text-main dark:text-white">{risk}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center justify-center pl-3">
                                                        <div className={`w-2.5 h-2.5 rounded-full ${riskColor} shadow-sm`}></div>
                                                    </div>
                                                </div>
                                            ) : (
                                                // Header da Visão Aberta
                                                <div className="p-4 pb-0 flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <div className={`w-2.5 h-2.5 rounded-full ${riskColor} shadow-sm`}></div>
                                                        <span className="font-black text-text-dark-brown dark:text-white text-base uppercase">{day} {month}</span>
                                                    </div>
                                                    <div className="flex items-baseline gap-1">
                                                        <span className="text-xl font-bold text-text-main dark:text-white">{entry.weight}</span>
                                                        <span className="text-sm font-medium text-text-main/60 dark:text-white/60">kg</span>
                                                        <Icon name="expand_less" className="text-gray-300 text-sm ml-1" />
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {isOpen && (
                                            <div className="animate-fade-in">
                                                <div className="px-6 py-6 flex justify-between items-start">
                                                    <div className="flex flex-col items-center gap-2 w-1/3">
                                                        <div className="w-16 h-16 rounded-full bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center mb-1">
                                                            <Icon name="straighten" className="text-blue-500 text-3xl" />
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">CINTURA</p>
                                                            <p className="text-lg font-bold text-text-main dark:text-white">{entry.waist || '--'}cm</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-2 w-1/3">
                                                        <div className="w-16 h-16 rounded-full bg-yellow-50 dark:bg-yellow-900/20 flex items-center justify-center mb-1">
                                                            <Icon name="calculate" className="text-orange-400 text-3xl" />
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">IMC</p>
                                                            <p className="text-lg font-bold text-text-main dark:text-white">{imc}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-2 w-1/3">
                                                        <div className="w-16 h-16 rounded-full bg-pink-50 dark:bg-pink-900/20 flex items-center justify-center mb-1">
                                                            <Icon name="favorite" className="text-pink-400 text-3xl" />
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">RISCO</p>
                                                            <p className="text-lg font-bold text-text-main dark:text-white">{risk}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="px-6 pb-6 flex justify-end gap-6 border-t border-gray-100 dark:border-slate-700 pt-4">
                                                    <button onClick={(e) => {e.stopPropagation(); onDeleteEntry(entry.id);}} className="flex items-center gap-1.5 text-status-danger hover:bg-status-danger/10 px-3 py-1 rounded-full transition-colors">
                                                        <Icon name="delete" className="text-lg" />
                                                        <span className="text-xs font-bold">Apagar</span>
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                </div>
            );
        };

        // --- App Component Principal ---
        const App = () => {
            const [view, setView] = useState('history'); // history, profile
            const [showAddModal, setShowAddModal] = useState(false);
            
            // Estado Persistente (LocalStorage)
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('health_profile');
                return saved ? JSON.parse(saved) : { name: '', age: '', height: '', gender: 'Masculino', targetWeight: '' };
            });

            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('health_entries');
                return saved ? JSON.parse(saved) : [];
            });

            // Efeitos para salvar automaticamente
            useEffect(() => { localStorage.setItem('health_profile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('health_entries', JSON.stringify(entries)); }, [entries]);

            const handleSaveProfile = (newProfile) => {
                setUserProfile(newProfile);
                setView('history');
            };

            const handleSaveEntry = (newEntry) => {
                setEntries([newEntry, ...entries].sort((a,b) => new Date(b.date) - new Date(a.date)));
                setShowAddModal(false);
            };

            const handleDeleteEntry = (id) => {
                if(confirm('Tem certeza que deseja apagar?')) {
                    setEntries(entries.filter(e => e.id !== id));
                }
            };

            const lastEntry = entries.length > 0 ? entries[0] : null;

            return (
                <div className="max-w-md mx-auto relative bg-background-light dark:bg-background-dark min-h-screen shadow-2xl overflow-hidden">
                    
                    {/* Renderização condicional das Telas */}
                    {view === 'history' && (
                        <HistoryScreen 
                            entries={entries} 
                            userProfile={userProfile} 
                            onDeleteEntry={handleDeleteEntry}
                        />
                    )}
                    
                    {view === 'profile' && (
                        <ProfileScreen 
                            userProfile={userProfile} 
                            onSave={handleSaveProfile}
                            onBack={() => setView('history')}
                        />
                    )}

                    {/* Botão Flutuante de Adicionar */}
                    {view === 'history' && (
                        <button 
                            onClick={() => setShowAddModal(true)}
                            className="fixed right-6 bottom-24 size-14 rounded-full bg-primary text-white shadow-lg shadow-primary/40 flex items-center justify-center active:scale-90 transition-transform z-50 hover:bg-primary/90"
                        >
                            <Icon name="add" className="text-3xl" />
                        </button>
                    )}

                    {/* Modal */}
                    {showAddModal && (
                        <AddEntryModal 
                            onClose={() => setShowAddModal(false)} 
                            onSave={handleSaveEntry}
                            lastEntry={lastEntry}
                        />
                    )}

                    {/* Barra de Navegação Inferior */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-background-dark/90 ios-blur border-t border-orange-50 dark:border-slate-800 px-8 pb-8 pt-3 z-40 max-w-md mx-auto">
                        <div className="flex justify-between items-center">
                            <button 
                                onClick={() => setView('history')}
                                className={`flex flex-col items-center gap-0.5 ${view === 'history' ? 'text-primary' : 'text-gray-300 dark:text-gray-600'}`}
                            >
                                <Icon name="history" className="text-2xl" fill={view === 'history' ? 1 : 0} />
                                <span className="text-[9px] font-bold uppercase">Histórico</span>
                            </button>
                            
                            <button className="flex flex-col items-center gap-0.5 text-gray-300 dark:text-gray-600 cursor-not-allowed opacity-50">
                                <Icon name="monitoring" className="text-2xl" />
                                <span className="text-[9px] font-bold uppercase">Dashboard</span>
                            </button>

                            <button 
                                onClick={() => setView('profile')}
                                className={`flex flex-col items-center gap-0.5 ${view === 'profile' ? 'text-primary' : 'text-gray-300 dark:text-gray-600'}`}
                            >
                                <Icon name="person" className="text-2xl" fill={view === 'profile' ? 1 : 0} />
                                <span className="text-[9px] font-bold uppercase">Perfil</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
