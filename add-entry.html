<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Adicionar Medidas - Controle de Peso</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff7857",
                        "secondary": "#0ea5e9",
                        "background-light": "#f8f6f5",
                        "background-dark": "#23130f",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-10 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#2d1a15] w-full max-w-[440px] rounded-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="flex items-center justify-between p-6 pb-2">
                <h2 id="modal-title" class="text-[#1d100c] dark:text-white text-2xl font-bold tracking-tight">Adicionar Medidas</h2>
                <button onclick="window.location.href='history.html'" class="text-[#1d100c] dark:text-white/60 p-2 hover:bg-black/5 rounded-full transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="entry-form" class="p-6 space-y-6">
                <div class="space-y-2">
                    <label class="block text-[#1d100c] dark:text-white/80 text-sm font-semibold ml-1">Peso (kg)</label>
                    <div class="relative group">
                        <input id="weight-input" autofocus class="w-full h-14 bg-background-light dark:bg-background-dark border border-[#ead3cd] dark:border-[#3d2a25] rounded-xl px-4 pr-12 text-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#a15745]/50 dark:text-white" inputmode="decimal" placeholder="00,0" step="0.1" type="number" required/>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
                            <span class="material-symbols-outlined">scale</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between ml-1">
                        <div class="flex items-baseline gap-1.5">
                            <label class="block text-[#1d100c]/60 dark:text-white/40 text-sm font-medium leading-tight">Cintura (cm)</label>
                            <span class="text-[11px] font-normal text-[#1d100c]/40 dark:text-white/30">(Opcional)</span>
                        </div>
                        <button type="button" onclick="repeatLastWaist()" class="flex items-center gap-1.5 px-3 py-1.5 bg-secondary/10 hover:bg-secondary/20 text-secondary border border-secondary/20 rounded-full transition-all active:scale-95 shadow-sm">
                            <span class="material-symbols-outlined text-[16px]">history</span>
                            <span class="text-xs font-bold tracking-tight">Repetir última</span>
                        </button>
                    </div>
                    <div class="relative group">
                        <input id="waist-input" class="w-full h-12 bg-background-light/50 dark:bg-background-dark/50 border border-[#ead3cd]/60 dark:border-[#3d2a25]/60 rounded-xl px-4 pr-12 text-base focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-[#a15745]/30 dark:text-white/60" inputmode="numeric" placeholder="00" type="number"/>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-[#a15745]/40 dark:text-white/30">
                            <span class="material-symbols-outlined">straighten</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[#1d100c] dark:text-white/80 text-sm font-semibold ml-1">Data do Registro</label>
                    <div class="relative">
                        <input id="date-input" type="date" class="w-full h-14 bg-background-light dark:bg-background-dark border border-[#ead3cd] dark:border-[#3d2a25] rounded-xl px-4 pr-12 text-lg dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-primary pointer-events-none">
                            <span class="material-symbols-outlined">calendar_today</span>
                        </div>
                    </div>
                </div>
            </form>

            <div class="p-6 pt-2 bg-background-light/50 dark:bg-black/20 flex flex-col gap-3">
                <button onclick="saveEntry()" type="button" class="w-full h-14 bg-primary text-white text-lg font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">check_circle</span>
                    <span id="save-btn-text">Salvar Registro</span>
                </button>
                <button onclick="window.location.href='history.html'" type="button" class="w-full h-12 bg-transparent border-2 border-[#ead3cd] dark:border-[#3d2a25] text-[#1d100c] dark:text-white text-base font-semibold rounded-xl hover:bg-black/5 dark:hover:bg-white/5 transition-all">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="calculations.js"></script>
    <script>
        let editingId = null;

        // Inicializar
        function init() {
            // Definir data atual como padrão
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-input').value = today;

            // Verificar se está editando
            const urlParams = new URLSearchParams(window.location.search);
            editingId = urlParams.get('edit');

            if (editingId) {
                loadEntryForEdit(editingId);
            }
        }

        // Carregar registro para edição
        function loadEntryForEdit(id) {
            const entries = getEntries();
            const entry = entries.find(e => e.id === id);

            if (entry) {
                document.getElementById('modal-title').textContent = 'Editar Medidas';
                document.getElementById('save-btn-text').textContent = 'Atualizar Registro';
                document.getElementById('weight-input').value = entry.weight;
                document.getElementById('waist-input').value = entry.waist || '';
                document.getElementById('date-input').value = entry.date;
            }
        }

        // Repetir última medida de cintura
        function repeatLastWaist() {
            const entries = getEntries();
            if (entries.length > 0) {
                const sortedEntries = entries.sort((a, b) => new Date(b.date) - new Date(a.date));
                const lastWaist = sortedEntries.find(e => e.waist)?.waist;
                
                if (lastWaist) {
                    document.getElementById('waist-input').value = lastWaist;
                } else {
                    alert('Nenhuma medida de cintura anterior encontrada!');
                }
            }
        }

        // Salvar registro
        function saveEntry() {
            const weight = parseFloat(document.getElementById('weight-input').value);
            const waist = parseFloat(document.getElementById('waist-input').value) || null;
            const date = document.getElementById('date-input').value;

            if (!weight || weight <= 0) {
                alert('Por favor, informe um peso válido!');
                return;
            }

            if (!date) {
                alert('Por favor, informe uma data!');
                return;
            }

            const profile = getProfile();
            if (!profile || !profile.height || !profile.gender) {
                if (confirm('Você ainda não configurou seu perfil. Deseja configurá-lo agora?')) {
                    window.location.href = 'profile.html';
                }
                return;
            }

            const entry = {
                id: editingId || generateId(),
                weight: weight,
                waist: waist,
                date: date,
                timestamp: new Date().toISOString()
            };

            // Calcular dados adicionais
            const calculations = calculateHealthMetrics(weight, waist, profile.height, profile.gender);
            entry.bmi = calculations.bmi;
            entry.bodyFat = calculations.bodyFat;
            entry.risk = calculations.risk;

            if (editingId) {
                updateEntry(editingId, entry);
            } else {
                addEntry(entry);
            }

            window.location.href = 'index.html';
        }

        // Gerar ID único
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // Inicializar ao carregar
        init();
    </script>
</body>
</html>
